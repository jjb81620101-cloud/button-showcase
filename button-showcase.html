<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>按鈕設計展示 | Jacky's Button Showcase</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #ec4899;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --dark: #1e1e2e;
      --light: #f8fafc;
      --text: #334155;
      --text-light: #64748b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 80px;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 50%, #c4b5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 1.25rem;
      color: #94a3b8;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .section {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 48px;
      margin-bottom: 40px;
      transition: all 0.3s ease;
    }

    .section:hover {
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 24px;
      background: linear-gradient(180deg, var(--primary), var(--secondary));
      border-radius: 2px;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 24px;
    }

    .button-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 16px;
      transition: all 0.3s ease;
    }

    .button-wrapper:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    /* Base Button Styles */
    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 32px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      text-decoration: none;
    }

    /* Primary Gradient Button */
    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.6);
    }

    .btn-primary:active {
      transform: translateY(-1px) scale(0.98);
    }

    /* Glass Morphism Button */
    .btn-glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-glass:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(255, 255, 255, 0.1);
    }

    /* Neon Button */
    .btn-neon {
      background: transparent;
      color: #0ff;
      border: 2px solid #0ff;
      box-shadow: 0 0 5px #0ff, inset 0 0 5px rgba(0, 255, 255, 0.1);
    }

    .btn-neon:hover {
      background: rgba(0, 255, 255, 0.1);
      box-shadow: 0 0 20px #0ff, 0 0 40px rgba(0, 255, 255, 0.3), inset 0 0 20px rgba(0, 255, 255, 0.1);
      transform: translateY(-2px);
      text-shadow: 0 0 10px #0ff;
    }

    /* 3D Button */
    .btn-3d {
      background: linear-gradient(145deg, #7c3aed, #5b21b6);
      color: #fff;
      box-shadow: 0 6px 0 #4c1d95, 0 8px 20px rgba(124, 58, 237, 0.3);
    }

    .btn-3d:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #4c1d95, 0 12px 30px rgba(124, 58, 237, 0.4);
    }

    .btn-3d:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #4c1d95, 0 4px 10px rgba(124, 58, 237, 0.3);
    }

    /* Cyberpunk Button */
    .btn-cyber {
      background: linear-gradient(90deg, transparent, rgba(255, 0, 128, 0.2), transparent);
      color: #ff0080;
      border: 1px solid #ff0080;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .btn-cyber::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 0, 128, 0.4), transparent);
      transition: left 0.5s ease;
    }

    .btn-cyber:hover::before {
      left: 100%;
    }

    .btn-cyber:hover {
      color: #fff;
      text-shadow: 0 0 10px #ff0080;
      box-shadow: 0 0 20px rgba(255, 0, 128, 0.5);
    }

    /* Soft Pill Button */
    .btn-soft {
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      color: var(--primary);
      border-radius: 50px;
    }

    .btn-soft:hover {
      background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
    }

    /* Icon + Text Button */
    .btn-icon {
      background: var(--dark);
      color: #fff;
      padding: 16px 24px;
    }

    .btn-icon svg {
      width: 20px;
      height: 20px;
      transition: transform 0.3s ease;
    }

    .btn-icon:hover svg {
      transform: rotate(15deg) scale(1.1);
    }

    .btn-icon:hover {
      background: linear-gradient(135deg, var(--dark) 0%, #2d2d44 100%);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    }

    /* Ripple Effect Button */
    .btn-ripple {
      background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
      color: #fff;
      overflow: hidden;
    }

    .btn-ripple::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      top: 50%;
      left: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.5s ease;
    }

    .btn-ripple:hover::after {
      transform: translate(-50%, -50%) scale(2);
    }

    .btn-ripple:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
    }

    /* Outline Button */
    .btn-outline {
      background: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    .btn-outline:hover {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
    }

    /* Animated Border Button */
    .btn-animated-border {
      background: var(--dark);
      color: #fff;
      border: 2px solid transparent;
      background-clip: padding-box;
      position: relative;
    }

    .btn-animated-border::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #ff0080, #ff8c00, #40e0d0, #ff0080);
      background-size: 400% 400%;
      border-radius: 14px;
      z-index: -1;
      animation: borderAnimation 3s ease infinite;
    }

    @keyframes borderAnimation {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .btn-animated-border:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 40px rgba(255, 0, 128, 0.2);
    }

    /* Particle Button */
    .btn-particle {
      background: linear-gradient(135deg, var(--warning) 0%, #d97706 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
    }

    .btn-particle:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 12px 35px rgba(245, 158, 11, 0.5);
    }

    /* Shimmer Button */
    .btn-shimmer {
      background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-shimmer::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.7s ease;
    }

    .btn-shimmer:hover::before {
      left: 150%;
    }

    .btn-shimmer:hover {
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 30px rgba(255, 255, 255, 0.1);
    }

    /* Size Variants */
    .btn-sm {
      padding: 10px 20px;
      font-size: 0.875rem;
      border-radius: 8px;
    }

    .btn-lg {
      padding: 20px 40px;
      font-size: 1.125rem;
      border-radius: 16px;
    }

    .full-width {
      width: 100%;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px 20px;
      color: #64748b;
      font-size: 0.875rem;
    }

    footer a {
      color: var(--primary);
      text-decoration: none;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 40px 16px;
      }

      .section {
        padding: 32px 20px;
      }

      .button-grid {
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
      }
    }

    /* Loading Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn.loading .btn-text {
      opacity: 0;
    }

    .btn.loading .spinner {
      position: absolute;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>按鈕設計展示</h1>
      <p class="subtitle">精選 12 款現代化按鈕設計，包含多種 hover 效果與響應式佈局</p>
    </header>

    <!-- Primary Styles -->
    <section class="section">
      <h2 class="section-title">主要按鈕風格</h2>
      <div class="button-grid">
        <div class="button-wrapper">
          <button class="btn btn-primary">Primary</button>
        </div>
        <div class="button-wrapper">
          <button class="btn btn-glass">Glass</button>
        </div>
        <div class="button-wrapper">
          <button class="btn btn-neon">Neon</button>
        </div>
        <div class="button-wrapper">
          <button class="btn btn-3d">3D Press</button>
        </div>
      </div>
    </section>

    <!-- Special Effects -->
    <section class="section">
      <h2 class="section-title">特效按鈕</h2>
      <div class="button-grid">
        <div class="button-wrapper">
          <button class="btn btn-cyber">Cyber</button>
        </div>
        <div class="button-wrapper">
          <button class="btn btn-soft">Soft Pill</button>
        </div>
        <div class="button-wrapper">
          <button class="btn btn-ripple">Ripple</button>
        </div>
        <div class="button-wrapper">
          <button class="btn btn-animated-border">Animated</button>
        </div>
      </div>
    </section>

    <!-- Utility Buttons -->
    <section class="section">
      <h2 class="section-title">功能按鈕</h2>
      <div class="button-grid">
        <div class="button-wrapper">
          <button class="btn btn-outline">Outline</button>
        </div>
        <div class="button-wrapper">
          <button class="btn btn-shimmer">Shimmer</button>
        </div>
        <div class="button-wrapper">
          <button class="btn btn-particle">Particle</button>
        </div>
        <div class="button-wrapper">
          <button class="btn btn-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
            </svg>
            <span class="btn-text">Upload</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Size Variants -->
    <section class="section">
      <h2 class="section-title">尺寸變化</h2>
      <div class="button-grid">
        <div class="button-wrapper">
          <button class="btn btn-primary btn-sm">Small</button>
        </div>
        <div class="button-wrapper">
          <button class="btn btn-primary">Default</button>
        </div>
        <div class="button-wrapper">
          <button class="btn btn-primary btn-lg">Large</button>
        </div>
      </div>
    </section>

    <!-- Full Width -->
    <section class="section">
      <h2 class="section-title">全寬按鈕</h2>
      <div class="button-grid" style="grid-template-columns: 1fr;">
        <div class="button-wrapper">
          <button class="btn btn-primary full-width">全寬 Primary 按鈕</button>
        </div>
        <div class="button-wrapper">
          <button class="btn btn-glass full-width">全寬 Glass 按鈕</button>
        </div>
      </div>
    </section>

    <footer>
      <p>Designed by <strong>Jacky</strong> • 使用純 HTML + CSS</p>
    </footer>
  </div>

  <script>
    // Ripple Effect
    document.querySelectorAll('.btn-ripple').forEach(btn => {
      btn.addEventListener('click', function(e) {
        const ripple = document.createElement('span');
        const rect = this.getBoundingClientRect();
        ripple.style.cssText = `
          position: absolute;
          width: 20px;
          height: 20px;
          background: rgba(255,255,255,0.4);
          border-radius: 50%;
          transform: scale(0);
          animation: ripple 0.6s linear;
          pointer-events: none;
          left: ${e.clientX - rect.left - 10}px;
          top: ${e.clientY - rect.top - 10}px;
        `;
        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      });
    });

    // Add ripple animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes ripple {
        to { transform: scale(15); opacity: 0; }
      }
    `;
    document.head.appendChild(style);

    // Loading state demo
    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', function() {
        if (this.classList.contains('btn-primary') && !this.classList.contains('loading')) {
          this.classList.add('loading');
          this.innerHTML += '<span class="spinner"></span>';
          setTimeout(() => {
            this.classList.remove('loading');
            const spinner = this.querySelector('.spinner');
            if (spinner) spinner.remove();
          }, 1500);
        }
      });
    });
  </script>
</body>
</html>
