<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Showcase</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: white;
    }
    h1 { font-size: 2.5rem; margin-bottom: 30px; text-align: center; }
    .links { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    .link-btn {
      padding: 16px 32px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .link-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    .info { margin-top: 40px; text-align: center; color: #888; }
  </style>
</head>
<body>
  <h1>🎨 Button Showcase</h1>
  <div class="links">
    <a href="button.html" class="link-btn">📋 Simple (4 buttons)</a>
    <a href="button-showcase.html" class="link-btn">✨ Full (12 buttons)</a>
  </div>
  <p class="info">Click above to explore different button styles</p>
</body>
</html>
